name: Release Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - 'lib/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/release-gate.yml'

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run required release gate suite
        run: npm run test:release-gate

      - name: Upload release gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ github.sha }}
          path: |
            npm-debug.log*
            .tmp/**
